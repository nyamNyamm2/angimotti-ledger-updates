name: Deploy update files

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare update site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/stable
          touch _site/.nojekyll
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const manifest = JSON.parse(fs.readFileSync("stable/versions.json", "utf8"));
          const files = new Set(["latest.yml", "versions.json", "notices.json"]);

          function addVersion(version) {
            if (!version) {
              return;
            }

            const item = manifest.versions.find((candidate) => candidate.version === version);

            if (!item) {
              throw new Error(`Missing version metadata: ${version}`);
            }

            files.add(item.installerPath);
            files.add(item.blockmapPath);
            files.add(item.latestPath);
          }

          addVersion(manifest.current);
          addVersion(manifest.previousStable);
          addVersion(manifest.lts);

          for (const file of files) {
            if (!file) {
              continue;
            }

            const source = path.join("stable", file);
            const destination = path.join("_site", "stable", file);

            if (!fs.existsSync(source)) {
              throw new Error(`Missing update file: ${source}`);
            }

            fs.mkdirSync(path.dirname(destination), { recursive: true });
            fs.copyFileSync(source, destination);
          }
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
